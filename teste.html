<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Idiomas</title>
    <style>
 
        
        .idiomas-container {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            max-width: 400px;
            width: 100%;
        }
        
       
        
        .nivel-container {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .barra-progresso {
            flex: 1;
            height: 8px;
            background: #e0e0e0;
            border-radius: 10px;
            overflow: hidden;
        }
        
        .progresso {
            height: 100%;
            border-radius: 10px;
            transition: width 0.5s ease;
        }
        
        .progresso-portugues {
            width: 100%;
            background: #2576ac;
        }
        
        .progresso-ingles {
            width: 60%;
            background: #3498db;
        }
        
        
    </style>
</head>
<body>
    <div class="idiomas-container">
        <div class="idioma-item">
            <div class="nivel-container">
                <div class="barra-progresso">
                    <div class="progresso progresso-portugues"></div>
                </div>
                <span class="nivel-texto">Nativo</span>
            </div>
        </div>
        

        
        <div class="idioma-item">
            <div class="nivel-container">
                <div class="barra-progresso">
                    <div class="progresso progresso-ingles"></div>
                </div>
                <span class="nivel-texto">Intermediário</span>
            </div>
            <div class="observacao">(cursando)</div>
        </div>
    </div>
</body>
</html>
